type LRVariantPopulationFreq {
  id: String!
  af: Float!
}

type LRVariantFreq {
  af: Float!
  ac: Int!
  an: Int!
}

type LRVariant {
  variant_id: String!
  chrom: String!
  pos: Int!
  end: Int
  ref: String!
  alt: String!

  # Classification
  allele_type: String!
  allele_length: Int

  # Frequencies
  freq: LRVariantFreq
  populations: [LRVariantPopulationFreq!]

  # Annotations
  rsid: String
  major_consequence: String
  cadd_phred: Float
  phylop: Float
  filters: [String!]
  sv_consequences: [String!]

  # SV / TR specific
  tr_id: String
  tr_motifs: String
  gnomad_str: String
  dbsnp_id: String

  # Haplotype context (nullable — only populated in haplotype queries)
  allele_methylation: Float
  allele_purity: Float
  motif_counts: [Int!]
  in_samples: [String!]
  gt_phased: Boolean
}

type HaplotypeVariantSet {
  variants: [LRVariant!]!
  readable_id: String!
}

type HaplotypeSample {
  sample_id: String!
  variant_sets: [HaplotypeVariantSet!]!
}

type HaplotypeGroup {
  samples: [HaplotypeSample!]!
  variants: HaplotypeVariantSet!
  below_threshold: HaplotypeVariantSet!
  start: Int!
  stop: Int!
  readable_id: String!
  hash: String!
}

type ClusterConsensusVariant {
  variant: LRVariant!
  cluster_af: Float!
}

type HaplotypeCluster {
  cluster_id: String!
  sample_count: Int!
  member_group_hashes: [String!]!
  consensus_variants: [ClusterConsensusVariant!]!
}

type HaplotypeGroups {
  groups: [HaplotypeGroup!]!
  clusters: [HaplotypeCluster!]
  tree_json: String
}

type MethylationRecord {
  chr: String!
  pos1: Int!
  pos2: Int!
  methylation: Float!
  sample: String!
  coverage: Int
}

type MethylationSummaryRecord {
  chrom: String!
  pos1: Int!
  pos2: Int!
  mean_methylation: Float!
  mean_coverage: Float!
  num_samples: Int!
  std_methylation: Float
  min_methylation: Float
  max_methylation: Float
}

type MethylationOutlierSample {
  sample_id: String!
  outlier_count: Int!
  outlier_fraction: Float!
  direction: String!
}

type MethylationOutlierRanking {
  chrom: String!
  start: Int!
  stop: Int!
  total_cpg_sites: Int!
  total_samples: Int!
  samples: [MethylationOutlierSample!]!
}

type RecombinationRateRecord {
  start: Int!
  end: Int!
  value: Float!
}

type MQTLAssociation {
  variant_id: String!
  variant_pos: Int!
  cpg_pos: Int!
  p_value: Float!
  effect_size: Float!
  carrier_count: Int!
  non_carrier_count: Int!
}

type SampleMetadata {
  sample_id: String!
  subpopulation: String!
  superpopulation: String!
}

type STRHistogramPopulation {
  key: String!
  histogram: String!
}

type STRHistogramRecord {
  chrom: String!
  position: Int!
  end_position: Int!
  motif: String!
  allele_size_histogram: String!
  biallelic_histogram: String!
  min_repeats: Float
  mode_repeats: Float
  mean_repeats: Float
  stdev_repeats: Float
  median_repeats: Float
  p99_repeats: Float
  max_repeats: Float
  unique_allele_lengths: Int
  num_called_alleles: Int
  populations: [STRHistogramPopulation!]
}

enum StrQualityCategory {
  CLEAN
  BORDERLINE
  LEGIT_BINNED
  BOGUS_PURITY
  DEGENERATE_MOTIF
  SV_CONTAMINATION
  DELETION_BUG
}

type StrCatalogLocus {
  position: Int!
  chrom: String!
  trId: String!
  motifs: String!
  motifCount: Int!
  numHaplotypes: Int!
  distinctAlleleLengths: Int!
  minAlleleLen: Int!
  maxAlleleLen: Int!
  sizeRatio: Float
  avgPurity: Float!
  minPurity: Float!
  countBelow50Purity: Int!
  hasOverlargeSvOutlier: Boolean!
  hasDeletionBug: Boolean!
  category: StrQualityCategory!
}

extend type Query {
  sample_metadata: [SampleMetadata!]!
  mqtl_associations(
    chrom: String!
    start: Int!
    stop: Int!
    min_af: Float
    max_distance: Int
    min_carriers: Int
  ): [MQTLAssociation!]!

  haplotype_groups(
    chrom: String!
    start: Int!
    stop: Int!
    min_allele_freq: Float
    sort_by: String
    cluster_threshold: Float
  ): HaplotypeGroups

  methylation(
    chrom: String!
    start: Int!
    stop: Int!
    samples: [String!]
  ): [MethylationRecord!]!

  methylation_summary(
    chrom: String!
    start: Int!
    stop: Int!
  ): [MethylationSummaryRecord!]!

  methylation_outliers(
    chrom: String!
    start: Int!
    stop: Int!
  ): MethylationOutlierRanking

  recombination_rate(
    chrom: String!
    start: Int!
    stop: Int!
  ): [RecombinationRateRecord!]!

  lr_coverage(
    chrom: String!
    start: Int!
    stop: Int!
  ): [CoverageBin!]!

  lr_str_histogram(chrom: String!, position: Int!): STRHistogramRecord

  str_catalog(chrom: String!): [StrCatalogLocus!]!

  str_catalog_haplotypes(chrom: String!): HaplotypeGroups
}
