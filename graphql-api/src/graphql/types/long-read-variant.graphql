type LongReadTranscriptConsequence {
  consequence_terms: [String!]
  domains: [String!]
  gene_id: String!
  gene_version: String
  gene_symbol: String
  hgvs: String
  hgvsc: String
  hgvsp: String
  is_canonical: Boolean
  is_mane_select: Boolean
  is_mane_select_version: Boolean
  major_consequence: String
  polyphen_prediction: String
  refseq_id: String # TK missing?
  refseq_version: String # TK missing?
  sift_prediction: String
  transcript_id: String!
  transcript_version: String
  # Deprecated - replaced by is_canonical
  canonical: Boolean
}

type LongReadVariantAllFrequencies {
  ac: Int!
  an: Int!
  af: Float!
  homozygote_ref_count: Int
  homozygote_alt_count: Int
  heterozygote_count: Int
  homozygote_ref_freq: Float
  homozygote_alt_freq: Float
  heterozygote_freq: Float
}

type LongReadVariantPopulationFrequencies {
  id: String!
  ac: Int!
  an: Int!
  af: Float!
  homozygote_ref_count: Int
  homozygote_alt_count: Int
  heterozygote_count: Int
  homozygote_ref_freq: Float
  homozygote_alt_freq: Float
  heterozygote_freq: Float
}

type LongReadVariantFrequencies {
  all: LongReadVariantAllFrequencies!
  populations: [LongReadVariantPopulationFrequencies]!
}

type LongReadAlleleSizeBin {
  repunit_count: Int!
  frequency: Int!
}

type LongReadAlleleSizeDistribution {
  ancestry_group: String!
  sex: String!
  repunit: String!
  distribution: [LongReadAlleleSizeBin!]!
}

type LongReadGenotypeBin {
  short_allele_repunit_count: Int!
  long_allele_repunit_count: Int!
  frequency: Int!
}

type LongReadGenotypeDistribution {
  ancestry_group: String!
  sex: String!
  short_allele_repunit: String!
  long_allele_repunit: String!
  distribution: [LongReadGenotypeBin!]!
}

type LongReadTandemRepeatReferenceRegion {
  reference_genome: ReferenceGenomeId!
  chrom: String!
  start: Int!
  stop: Int!
}

type LongReadGene {
  symbol: String!
  ensembl_id: String!
}

type LongReadVariant {
  variant_id: String!
  reference_genome: ReferenceGenomeId!
  chrom: String!
  pos: Int!
  end: Int
  length: Int
  ref: String!
  alt: String!
  rsids: [String!]
  allele_type: String!
  xpos: Float!
  transcript_consequences: [LongReadTranscriptConsequence!]
  intergenic: Boolean
  genes: [LongReadGene!]
  major_consequence: String
  freq: LongReadVariantFrequencies
  short_read_match_id: String
  short_read_match_type: String
  short_read_match_source: String
  enveloping_tr_id: String
  enveloped_ids: [String!]
  sv_consequences: [String!]
  filters: [String!]
  gene_region: String
  gnomad_str: String
  is_likely_tr: Boolean
  motifs: [String!]
  allele_size_distribution: [LongReadAlleleSizeDistribution!]
  genotype_distribution: [LongReadGenotypeDistribution!]
  max_repunits: Int
  main_reference_region: LongReadTandemRepeatReferenceRegion
}
