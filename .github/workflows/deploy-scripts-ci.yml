name: Deploy scripts CI
on:
  push:
    branches:
      - main
    paths:
      - 'deploy/deployctl/**'
  pull_request:
    paths:
      - 'deploy/deployctl/**'
      - '.github/workflows/**'
jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Install dependencies
        # Install the exact dependencies from uv.lock without re-resolving or updating
        # the lockfile; fails if pyproject.toml has drifted from uv.lock.
        run: uv sync --frozen
      - name: Check formatting
        run: uv run ruff format --check deploy/deployctl
      - name: Run Ruff
        run: uv run ruff check deploy/deployctl
