name: Data Pipeline CI
on:
  push:
    branches:
      - main
    paths:
      - 'data-pipeline/**'
      - 'reads/**'
      - 'development/scripts/**'
  pull_request:
    paths:
      - 'data-pipeline/**'
      - 'reads/**'
      - 'development/scripts/**'
      - '.github/workflows/**'
jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'data-pipeline/uv.lock'
      - name: Install dependencies
        working-directory: data-pipeline
        # Install the exact dependencies from uv.lock without re-resolving or updating
        # the lockfile; fails if pyproject.toml has drifted from uv.lock.
        run: uv sync --frozen
      - name: Check formatting
        run: uv run --project data-pipeline ruff format --check data-pipeline/src/data_pipeline data-pipeline/tests data-pipeline/caids reads development/scripts
      - name: Run Ruff
        run: uv run --project data-pipeline ruff check data-pipeline/src/data_pipeline
      - name: Run Pyright
        run: uv run --project data-pipeline pyright --project data-pipeline
