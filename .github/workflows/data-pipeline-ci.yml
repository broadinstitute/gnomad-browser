name: Data Pipeline CI
on:
  push:
    branches:
      - main
    paths:
      - 'data-pipeline/**'
  pull_request:
    paths:
      - 'data-pipeline/**'
      - '.github/workflows/**'
jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: data-pipeline/uv.lock
      - name: Install dependencies
        run: uv sync
        working-directory: data-pipeline
      - name: Check formatting
        run: uv run ruff format --check src/data_pipeline
        working-directory: data-pipeline
      - name: Run Ruff
        run: uv run ruff check src/data_pipeline
        working-directory: data-pipeline
      - name: Run Pyright
        run: uv run pyright
        working-directory: data-pipeline
