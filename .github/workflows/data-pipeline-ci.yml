name: Data Pipeline CI
on:
  push:
    branches:
      - main
    paths:
      - 'data-pipeline/**'
      - 'reads/**'
      - 'development/scripts/**'
  pull_request:
    paths:
      - 'data-pipeline/**'
      - 'reads/**'
      - 'development/scripts/**'
      - '.github/workflows/**'
jobs:
  data-pipeline-checks:
    name: Data Pipeline Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'
      - name: Install dependencies
        run: make install-py-data-pipeline-dependencies
      - name: Check formatting
        run: make check-format-data-pipeline
      - name: Lint
        run: make lint-data-pipeline
      - name: Check types
        run: make typecheck-data-pipeline 
      - name: Run tests
        run: make test-data-pipeline
